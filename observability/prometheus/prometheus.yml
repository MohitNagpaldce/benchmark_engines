global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: temporal-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - temporal:8000

  - job_name: benchmark-runner
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9464

  - job_name: temporal-worker-sdk
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9465
